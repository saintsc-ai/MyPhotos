      const current = bodyEl.textContent;
      bodyEl.innerHTML = `
        <textarea style="width:100%;min-height:50px;background:#222;color:#eee;
          border:1px solid #333;border-radius:4px;padding:8px;font-size:13px;
          font-family:inherit;outline:none;box-sizing:border-box"
          data-role="edit-input">${escapeAttr(current)}</textarea>
        <div style="display:flex;gap:6px;margin-top:6px;justify-content:flex-end">
          <button class="cancel" data-role="edit-cancel"
            style="background:#2a2a2a;color:#ddd;border:1px solid #3a3a3a;
            border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px">취소</button>
          <button data-role="edit-save"
            style="background:#2a4d7a;color:white;border:1px solid #3a6db0;
            border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px">저장</button>
        </div>
      `;
      const input = bodyEl.querySelector('[data-role="edit-input"]');
      input.focus(); input.setSelectionRange(input.value.length, input.value.length);
      bodyEl.querySelector('[data-role="edit-cancel"]').addEventListener("click", () => {
        // Re-render to revert
        if (lightboxPhoto) loadDetails(lightboxPhoto.id);
      });
      bodyEl.querySelector('[data-role="edit-save"]').addEventListener("click", async () => {
        const text = input.value.trim();
        if (!text) return;
        if (!lightboxPhoto) return;
        const res = await _origFetch(
          `/api/photos/${lightboxPhoto.id}/comments/${commentId}`,
          {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ body: text }),
          }
        );
        if (!res.ok) {
          let m = `수정 실패 (${res.status})`;
          try { const d = await res.json(); if (d?.detail) m = d.detail; } catch (_) {}
          alert(m);
          return;
        }
        if (lightboxPhoto) loadDetails(lightboxPhoto.id);
      });
    }

    async function deleteComment(commentId) {
      if (!lightboxPhoto) return;
      if (!confirm("이 댓글을 삭제하시겠습니까?")) return;
      const res = await _origFetch(
        `/api/photos/${lightboxPhoto.id}/comments/${commentId}`,
        { method: "DELETE" }
      );
      if (!res.ok && res.status !== 204) {
        alert("삭제 실패 (" + res.status + ")");
        return;
      }
      loadDetails(lightboxPhoto.id);
    }

    // --- Description (shared, no author) ---
    const lbDesc = $("#lb-desc");

    function renderDescription(text) {
      if (text) {
        lbDesc.classList.remove("empty");
        lbDesc.textContent = text;
      } else {
        lbDesc.classList.add("empty");
        lbDesc.textContent = "설명 추가...";
      }
    }

    function startEditDescription() {
      if (!lightboxPhoto) return;
      const current = lbDesc.classList.contains("empty") ? "" : lbDesc.textContent;
      lbDesc.classList.remove("empty");
      lbDesc.innerHTML = `
        <textarea data-role="desc-input">${escapeAttr(current)}</textarea>
        <div class="lb-desc-actions">
          <button class="cancel" data-role="desc-cancel">취소</button>
          <button data-role="desc-save">저장</button>
        </div>
      `;
      const ta = lbDesc.querySelector('[data-role="desc-input"]');
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      lbDesc.querySelector('[data-role="desc-cancel"]').addEventListener(
        "click", () => renderDescription(current)
      );
      lbDesc.querySelector('[data-role="desc-save"]').addEventListener(
        "click", async () => {
          const text = ta.value;
          const res = await _origFetch(
            `/api/photos/${lightboxPhoto.id}/description`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ description: text }),
            }
          );
          if (!res.ok) { alert("저장 실패 (" + res.status + ")"); return; }
          renderDescription(text.trim());
        }
      );
    }
    lbDesc.addEventListener("click", () => {
      // Only edit when clicking the chip itself, not the inline editor.
      if (lbDesc.querySelector("textarea")) return;
      startEditDescription();
    });

    // --- Tags (chips + autocomplete) ---
    const lbTags = $("#lb-tags");
    const lbTagInput = $("#lb-tag-input");
    const lbTagSuggest = $("#lb-tag-suggest");
    let currentTags = [];           // names currently on this photo
    let allTagsCache = null;        // [{name, count}] from /api/photos/tags
    let suggestActive = -1;

    function renderTags(tags) {
      currentTags = (tags || []).slice();
      // Rebuild the chips before the input — keep the input element alive
      // (it's a sibling) so the user's focus + draft text isn't lost.
      lbTags.querySelectorAll(".lb-tag-chip").forEach(el => el.remove());
      const frag = document.createDocumentFragment();
      for (const name of currentTags) {
        const chip = document.createElement("span");
        chip.className = "lb-tag-chip";
        chip.title = `'${name}' 태그로 필터`;
        chip.innerHTML =
          `<span data-role="chip-name">${escapeAttr(name)}</span>` +
          `<button type="button" class="x" data-role="chip-remove">×</button>`;
        chip.querySelector('[data-role="chip-name"]').addEventListener("click", () => {
          // Apply tag filter to the timeline.
          filterCommentQ = "";
          filterTagQ = "";
          filterNear = null;
          filterMinRating = null;
          filterRootId = null;
          filterPathPrefix = "";
          // Reuse the search-rating dropdown UI state: leave alone.
          $("#search-q").value = name;
          $("#search-mode").value = "tag";
          window._pendingTagFilter = name;
          applyFiltersWithTag(name);
          closeLightbox();
        });
        chip.querySelector('[data-role="chip-remove"]').addEventListener("click", (e) => {
          e.stopPropagation();
          const next = currentTags.filter(t => t !== name);
          saveTags(next);
        });
        frag.appendChild(chip);
      }
      lbTags.insertBefore(frag, lbTagInput);
    }

    // Click on a tag chip from the lightbox jumps to the topic-filtered
    // timeline. filterTag is module-scope (see top) and already wired into
    // filterQueryString + anyFilterActive, so we just set + reload.
    async function applyFiltersWithTag(tag) {
      filterTag = tag || null;
      await applyFilters();
    }

    async function saveTags(newTags) {
      if (!lightboxPhoto) return;
      const res = await _origFetch(
        `/api/photos/${lightboxPhoto.id}/tags`,
        {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tags: newTags }),
        }
      );
      if (!res.ok) { alert("태그 저장 실패 (" + res.status + ")"); return; }
      const final = await res.json();
      renderTags(final);
      allTagsCache = null; // bust the cache so autocomplete shows new ones next time
    }

    async function ensureTagsCache() {
      if (allTagsCache) return allTagsCache;
      try {
        const r = await _origFetch("/api/photos/tags");
        if (r.ok) allTagsCache = await r.json();
        else allTagsCache = [];
      } catch (_) { allTagsCache = []; }
      return allTagsCache;
    }

    function renderTagSuggestions(query) {
      const q = (query || "").trim().toLowerCase();
      const tags = (allTagsCache || []).filter(t =>
        !currentTags.some(c => c.toLowerCase() === t.name.toLowerCase()) &&
        (q === "" || t.name.toLowerCase().includes(q))
      );
      const items = tags.slice(0, 8);
      const isNew = q && !(allTagsCache || []).some(t => t.name.toLowerCase() === q);
      const parts = items.map((t, i) =>
        `<div class="lb-tag-suggest-item${i === suggestActive ? " active" : ""}" data-name="${escapeAttr(t.name)}">${escapeAttr(t.name)}<span class="count">${t.count}</span></div>`
      );
      if (isNew) {
        parts.push(
          `<div class="lb-tag-suggest-item new${items.length === suggestActive ? " active" : ""}" data-name="${escapeAttr(query.trim())}">"${escapeAttr(query.trim())}" 새 태그로 추가</div>`
        );
      }
      if (!parts.length) {
        lbTagSuggest.classList.remove("show");
        lbTagSuggest.innerHTML = "";
        return;
      }
      lbTagSuggest.innerHTML = parts.join("");
      lbTagSuggest.classList.add("show");
      lbTagSuggest.querySelectorAll(".lb-tag-suggest-item").forEach(el => {
        el.addEventListener("mousedown", (e) => {
          // mousedown so we add before the blur fires on the input
          e.preventDefault();
          addTagFromInput(el.dataset.name);
        });
      });
    }

    function addTagFromInput(name) {
      const trimmed = (name || "").trim();
      if (!trimmed) return;
      if (currentTags.some(t => t.toLowerCase() === trimmed.toLowerCase())) {
        // Already present — just clear input.
        lbTagInput.value = "";
        lbTagSuggest.classList.remove("show");
        return;
      }
      const next = currentTags.concat([trimmed]);
      lbTagInput.value = "";
      suggestActive = -1;
      lbTagSuggest.classList.remove("show");
      saveTags(next);
    }

    lbTagInput.addEventListener("focus", async () => {
      await ensureTagsCache();
      suggestActive = -1;
      renderTagSuggestions(lbTagInput.value);
    });
    lbTagInput.addEventListener("input", () => {
      suggestActive = -1;
      renderTagSuggestions(lbTagInput.value);
    });
    lbTagInput.addEventListener("blur", () => {
      // Allow click handlers on suggestions to fire first.
      setTimeout(() => lbTagSuggest.classList.remove("show"), 120);
    });
    lbTagInput.addEventListener("keydown", (e) => {
      const items = lbTagSuggest.querySelectorAll(".lb-tag-suggest-item");
      if (e.key === "ArrowDown") {
        e.preventDefault();
        suggestActive = Math.min(items.length - 1, suggestActive + 1);
        renderTagSuggestions(lbTagInput.value);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        suggestActive = Math.max(-1, suggestActive - 1);
        renderTagSuggestions(lbTagInput.value);
      } else if (e.key === "Enter") {
        e.preventDefault();
        let pick = lbTagInput.value.trim();
        if (suggestActive >= 0 && items[suggestActive]) {
          pick = items[suggestActive].dataset.name;
        }
        addTagFromInput(pick);
      } else if (e.key === "Backspace" && !lbTagInput.value && currentTags.length) {
        // Quick remove of the last tag.
        e.preventDefault();
        saveTags(currentTags.slice(0, -1));
      } else if (e.key === "Escape") {
        lbTagSuggest.classList.remove("show");
      }
    });

    // --- Date / time edit modal ---
    const dateModal = $("#date-modal");
    function pad(n) { return String(n).padStart(2, "0"); }

    function openDateModal(d) {
      if (!lightboxPhoto) return;
      const cur = d.taken_at ? new Date(d.taken_at) : new Date();
      $("#date-input").value =
        `${cur.getFullYear()}-${pad(cur.getMonth() + 1)}-${pad(cur.getDate())}`;
      $("#date-h").value = cur.getHours();
      $("#date-m").value = cur.getMinutes();
      $("#date-s").value = cur.getSeconds();
      const orig = d.taken_at_original
        ? d.taken_at_original.replace("T", " ").slice(0, 19)
        : "(EXIF 그대로)";
      $("#date-original").textContent = orig;
      $("#date-msg").textContent = "";
      $("#date-revert").style.display = d.taken_at_original ? "" : "none";
      dateModal.classList.add("show");
      setTimeout(() => $("#date-input").focus(), 0);
    }
    function closeDateModal() { dateModal.classList.remove("show"); }
    $("#date-cancel").addEventListener("click", closeDateModal);
    dateModal.addEventListener("click", (e) => {
      if (e.target === dateModal) closeDateModal();
    });

    $("#date-revert").addEventListener("click", async () => {
      if (!lightboxPhoto) return;
      const res = await _origFetch(`/api/photos/${lightboxPhoto.id}/taken-at`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ taken_at: null }),
      });
      if (!res.ok) { $("#date-msg").textContent = "복원 실패"; return; }
      closeDateModal();
      loadDetails(lightboxPhoto.id);
    });

    $("#date-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!lightboxPhoto) return;
      const dateStr = $("#date-input").value;       // YYYY-MM-DD
      const h = parseInt($("#date-h").value, 10) || 0;
      const m = parseInt($("#date-m").value, 10) || 0;
      const s = parseInt($("#date-s").value, 10) || 0;
      if (!dateStr) { $("#date-msg").textContent = "날짜를 입력하세요"; return; }
      // Build a local ISO without timezone — the server stores naive UTC,
      // but for display purposes we just want the wall-clock to be preserved.
      const iso = `${dateStr}T${pad(h)}:${pad(m)}:${pad(s)}`;
      const res = await _origFetch(`/api/photos/${lightboxPhoto.id}/taken-at`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ taken_at: iso }),
      });
      if (!res.ok) {
        let msg = `저장 실패 (${res.status})`;
        try { const d = await res.json(); if (d?.detail) msg = d.detail; } catch (_) {}
        $("#date-msg").textContent = msg;
        return;
      }
      closeDateModal();
      loadDetails(lightboxPhoto.id);
    });

    function computeStripCount() {
      // Number of thumbs that fit across the viewport without overflow.
      const item = STRIP_THUMB_SIZE + STRIP_GAP;
      const stripPadding = 32;   // outer padding of .lb-strip-wrap + inner .lb-strip
      const usable = Math.max(item, window.innerWidth - stripPadding);
      const count = Math.floor(usable / item);
      return Math.max(1, count);
    }

    function renderFilmstrip() {
      const count = computeStripCount();
      const len = lightboxList.length;
      // Symmetric window around the current photo, shifted to stay in [0, len).
      let start = lightboxIndex - Math.floor(count / 2);
      let end = start + count;
      if (start < 0) { end -= start; start = 0; }
      if (end > len) {
        start = Math.max(0, start - (end - len));
        end = len;
      }

      const parts = [];
      for (let i = start; i < end; i++) {
        const p = lightboxList[i];
        const cls = i === lightboxIndex ? "lb-strip-item current" : "lb-strip-item";
        parts.push(
          `<div class="${cls}" data-idx="${i}" title="${escapeAttr(p.filename || "")}">` +
          `<img loading="lazy" src="/api/photos/${p.id}/thumb?size=256" alt="">` +
          `</div>`
        );
      }
      lbStrip.innerHTML = parts.join("");
      lbStrip.querySelectorAll(".lb-strip-item").forEach(el => {
        el.addEventListener("click", () => openLightboxByIndex(parseInt(el.dataset.idx, 10)));
      });
      // Center the current thumbnail in the strip's horizontal scroll (in case
      // the window can't be symmetric near the timeline edges).
      const current = lbStrip.querySelector(".current");
      if (current) {
        const stripRect = lbStrip.getBoundingClientRect();
        const itemRect = current.getBoundingClientRect();
        const delta = (itemRect.left + itemRect.width / 2) - (stripRect.left + stripRect.width / 2);
        lbStrip.scrollLeft += delta;
      }
    }

    // --- Map ---
    async function initMap() {
      if (map) return;
      map = L.map("map").setView([37.5, 127.0], 7);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);
      markers = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 50 });
      map.addLayer(markers);

      // The popup's box is sized before the thumbnail loads → the image
      // overflows the white frame. Re-measure once the image has natural
      // dimensions.
      map.on("popupopen", (e) => {
        const popup = e.popup;
        const el = popup.getElement && popup.getElement();
        const img = el && el.querySelector(".map-photo-popup img");
        if (!img) return;
        if (img.complete && img.naturalWidth > 0) {
          popup.update();
        } else {
          const refit = () => popup.update();
          img.addEventListener("load", refit, { once: true });
          img.addEventListener("error", refit, { once: true });
        }
      });

      await reloadMapMarkers();
    }

    // Reload markers with the current header-search / sidebar filters.
    // Safe to call before initMap — does nothing if the map isn't built yet.
    async function reloadMapMarkers() {
      if (!map || !markers) return;
      markers.clearLayers();
      const fq = filterQueryString();
      const res = await fetch(
        "/api/photos/locations?limit=250000" + (fq ? "&" + fq : "")
      );
      const data = await res.json();
      const bounds = [];
      for (const m of data) {
        const marker = L.marker([m.lat, m.lng]);
        // Inline onclick is the most reliable cross-cluster path —
        // popupopen-attached listeners were not firing under
        // Leaflet.markercluster's wrapped event flow. The helper is a
        // module-level function so the HTML can call it directly.
        marker.bindPopup(
          `<div class="map-photo-popup" data-photo-id="${m.id}" ` +
          `onclick="window.__mpOpenFromMap(${m.id})" ` +
          `style="cursor:zoom-in">` +
          `<img src="/api/photos/${m.id}/thumb?size=256" ` +
          `style="max-width:200px;max-height:200px;display:block" ` +
          `title="클릭하여 자세히 보기">` +
          `<div style="font-size:11px;color:#666;text-align:center;margin-top:4px">` +
          `클릭하여 자세히 보기` +
          `</div></div>`
        );
        markers.addLayer(marker);
        bounds.push([m.lat, m.lng]);
      }
      if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });
    }

    // Exposed for the inline onclick in map popup HTML.
    window.__mpOpenFromMap = function (id) {
      if (typeof map !== "undefined" && map) {
        try { map.closePopup(); } catch (_) { /* ignore */ }
      }
      openLightboxForPhotoId(id);
    };

    // --- View switching ---
    const VIEW_KEY = "myphotos-view";
    function setView(view) {
      const prevView = currentView;
      document.querySelectorAll(".tab").forEach(x => {
        x.classList.toggle("active", x.dataset.view === view);
      });
      currentView = view;

      // The folder filter only makes sense while the folder tab is active.
      // Leaving the tab clears it (and reloads the unfiltered timeline);
      // re-entering the tab keeps the last selection.
      const leavingFolder = prevView === "folder" && view !== "folder";
      if (leavingFolder && (filterRootId || filterPathPrefix)) {
        filterRootId = null;
        filterPathPrefix = "";
        // applyFilters will be called below by the timeline branch.
      }
      const leavingTopic = prevView === "topic" && view !== "topic";
      if (leavingTopic && (filterTag || filterFaceCluster)) {
        filterTag = null;
        filterFaceCluster = null;
      }

      document.body.classList.toggle("map-view", view === "map");
      document.body.classList.toggle("folder-view", view === "folder");
      document.body.classList.toggle("topic-view", view === "topic");

      if (view === "timeline") {
        $("#timeline-view").style.display = "";
        $("#map-view").style.display = "none";
        indicator.classList.remove("hidden");
        if (leavingFolder || leavingTopic) {
          applyFilters();
        } else {
          updateScrollIndicator();
        }
      } else if (view === "map") {
        $("#timeline-view").style.display = "none";
        $("#map-view").style.display = "";
        indicator.classList.add("hidden");
        initMap();
        setTimeout(() => map?.invalidateSize(), 50);
      } else if (view === "folder") {
        $("#timeline-view").style.display = "";
        $("#map-view").style.display = "none";
        indicator.classList.add("hidden");
        initFolderTree();
      } else if (view === "topic") {
        $("#timeline-view").style.display = "";
        $("#map-view").style.display = "none";
        // Like folder view: one filter scopes the grid — no need for the
        // catalog-wide year scrubber.
        indicator.classList.add("hidden");
        initTopicTree();
      }
      try { localStorage.setItem(VIEW_KEY, view); } catch (_) { /* private mode */ }
    }
    document.querySelectorAll(".tab").forEach(t => {
      t.addEventListener("click", () => setView(t.dataset.view));
    });

    // --- Folder tree (sidebar shown only on folder view) ---
    let folderTreeLoaded = false;
    async function initFolderTree() {
      if (folderTreeLoaded) return;
      const tree = $("#folder-tree");
      tree.innerHTML = '<div style="padding:10px;color:#888;font-size:12px">불러오는 중...</div>';
      try {
        const r = await _origFetch("/api/photos/roots");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const roots = await r.json();
        if (!roots.length) {
          tree.innerHTML = '<div style="padding:10px;color:#888;font-size:12px">사진 폴더가 등록되어 있지 않습니다.</div>';
          return;
        }
        tree.innerHTML = roots.map(r => `
          <div class="folder-node">
            <div class="folder-row" data-root-id="${r.id}" data-prefix="">
              <span class="folder-twirl" data-role="twirl">▶</span>
              <span class="folder-icon">📁</span>
              <span class="folder-name" title="${escapeAttr(r.abs_path)}">${escapeAttr(r.label)}</span>
              <span class="folder-count">${r.total_count.toLocaleString()}</span>
            </div>
            <div class="folder-children collapsed" data-loaded="0"></div>
          </div>
        `).join("");
        attachFolderRowHandlers(tree);
        folderTreeLoaded = true;
      } catch (e) {
        tree.innerHTML = `<div style="padding:10px;color:#a66;font-size:12px">로드 실패: ${escapeAttr(e.message || e)}</div>`;
      }
    }

    function attachFolderRowHandlers(scope) {
      scope.querySelectorAll(".folder-row").forEach(row => {
        if (row.dataset.bound) return;
        row.dataset.bound = "1";
        const twirl = row.querySelector('[data-role="twirl"]');
        if (twirl) {
          twirl.addEventListener("click", async (e) => {
            e.stopPropagation();
            await toggleFolder(row);
          });
        }
        row.addEventListener("click", async () => {
          await toggleFolder(row, /*forceExpand=*/true);
          selectFolder(row);
        });
      });
    }

    async function toggleFolder(row, forceExpand = false) {
      const node = row.closest(".folder-node");
      const children = node.querySelector(".folder-children");
      const twirl = row.querySelector('[data-role="twirl"]');
      if (!children) return;
      const collapsed = children.classList.contains("collapsed");
      if (!collapsed && !forceExpand) {
        children.classList.add("collapsed");
        if (twirl) twirl.textContent = "▶";
        return;
      }
      if (children.dataset.loaded === "0") {
        const rootId = row.dataset.rootId;
        const prefix = row.dataset.prefix || "";
        children.innerHTML = '<div style="padding:4px 8px;color:#666;font-size:11px">...</div>';
        try {
          const r = await _origFetch(
            `/api/photos/folders?root_id=${rootId}&prefix=${encodeURIComponent(prefix)}`
          );
          if (!r.ok) throw new Error("HTTP " + r.status);
          const data = await r.json();
          if (!data.children.length) {
            children.innerHTML = '<div style="padding:4px 8px;color:#666;font-size:11px">(하위 폴더 없음)</div>';
          } else {
            children.innerHTML = data.children.map(c => {
              const newPrefix = (prefix || "") + c.name + "/";
              return `
                <div class="folder-node">
                  <div class="folder-row" data-root-id="${rootId}" data-prefix="${escapeAttr(newPrefix)}">
                    <span class="folder-twirl ${c.has_children ? "" : "empty"}" data-role="twirl">▶</span>
                    <span class="folder-icon">📁</span>
                    <span class="folder-name" title="${escapeAttr(c.name)}">${escapeAttr(c.name)}</span>
                    <span class="folder-count">${c.count.toLocaleString()}</span>
                  </div>
                  <div class="folder-children collapsed" data-loaded="0"></div>
                </div>
              `;
            }).join("");
            attachFolderRowHandlers(children);
          }
          children.dataset.loaded = "1";
        } catch (e) {
          children.innerHTML = `<div style="padding:4px 8px;color:#a66;font-size:11px">로드 실패</div>`;
        }
      }
      children.classList.remove("collapsed");
      if (twirl && !twirl.classList.contains("empty")) twirl.textContent = "▼";
    }

    function selectFolder(row) {
      document.querySelectorAll("#folder-tree .folder-row.selected")
        .forEach(el => el.classList.remove("selected"));
      row.classList.add("selected");
      const rootId = parseInt(row.dataset.rootId, 10);
      const prefix = row.dataset.prefix || "";
      filterRootId = rootId;
      filterPathPrefix = prefix;
      applyFilters();
    }

    // --- Topic tree (auto-generated YOLO/CLIP tags + face clusters) ---
    let topicTreeLoaded = false;
    const TOPIC_SOURCE_LABEL = {
      "auto-yolo": { section: "객체 (YOLO)", badge: "객체" },
      "auto-clip": { section: "분위기 (CLIP)", badge: "분위기" },
      "face":      { section: "인물", badge: "인물" },
      "user":      { section: "사용자 태그", badge: "사용자" },
    };
    const TOPIC_SECTION_ORDER = ["auto-yolo", "face", "auto-clip", "user"];

    async function initTopicTree() {
      const tree = $("#topic-tree");
      if (topicTreeLoaded) return;
      tree.innerHTML = '<div style="padding:10px;color:#888;font-size:12px">불러오는 중...</div>';
      try {
        const [tagsRes, clustersRes] = await Promise.all([
          _origFetch("/api/photos/tags"),
          _origFetch("/api/admin/ml/clusters?only_named=false&min_count=2").catch(() => null),
        ]);
        if (!tagsRes.ok) throw new Error("HTTP " + tagsRes.status);
        const tags = await tagsRes.json();
        let clusters = [];
        if (clustersRes && clustersRes.ok) {
          clusters = await clustersRes.json();
        }
        if (!tags.length && !clusters.length) {
          tree.innerHTML = `
            <div style="padding:12px;color:#888;font-size:12px;line-height:1.6">
              아직 자동 분류된 항목이 없습니다.<br><br>
              관리 → 색인 탭에서 <b>ML 자동 분류</b>를 실행하면<br>
              객체·인물·분위기로 자동 태깅됩니다.
            </div>`;
          topicTreeLoaded = true;
          return;
        }

        // Group tags by source.
        const groups = {};
        for (const t of tags) {
          const src = t.source || "user";
          if (!groups[src]) groups[src] = [];
          groups[src].push(t);
        }
        const parts = [];

        // 객체 (YOLO)
        if (groups["auto-yolo"]?.length) {
          parts.push(`<div class="topic-section">${TOPIC_SOURCE_LABEL["auto-yolo"].section}</div>`);
          for (const t of groups["auto-yolo"]) {
            parts.push(`
              <div class="topic-row" data-tag="${escapeAttr(t.name)}">
                <span class="topic-name">${escapeAttr(t.name)}</span>
                <span class="topic-count">${t.count.toLocaleString()}</span>
              </div>`);
          }
        }

        // 인물 (얼굴 클러스터)
        if (clusters.length) {
          parts.push(`<div class="topic-section">${TOPIC_SOURCE_LABEL["face"].section}</div>`);
          for (const c of clusters) {
            const label = c.label ? escapeAttr(c.label) : `<em style="color:#888">미명명 #${c.id}</em>`;
            parts.push(`
              <div class="topic-row" data-cluster="${c.id}" title="클릭: 필터">
                <span class="topic-name">${label}</span>
                <button type="button" class="topic-rename" data-role="rename" title="이름 변경 (같은 이름이면 자동 병합)">✎</button>
                <span class="topic-count">${c.face_count.toLocaleString()}</span>
              </div>`);
          }
        }

        // 분위기 (CLIP)
        if (groups["auto-clip"]?.length) {
          parts.push(`<div class="topic-section">${TOPIC_SOURCE_LABEL["auto-clip"].section}</div>`);
          for (const t of groups["auto-clip"]) {
            parts.push(`
              <div class="topic-row" data-tag="${escapeAttr(t.name)}">
                <span class="topic-name">${escapeAttr(t.name)}</span>
                <span class="topic-count">${t.count.toLocaleString()}</span>
              </div>`);
          }
        }

        // 사용자 태그
        if (groups["user"]?.length) {
          parts.push(`<div class="topic-section">${TOPIC_SOURCE_LABEL["user"].section}</div>`);
          for (const t of groups["user"]) {
            parts.push(`
              <div class="topic-row" data-tag="${escapeAttr(t.name)}">
                <span class="topic-name">${escapeAttr(t.name)}</span>
                <span class="topic-count">${t.count.toLocaleString()}</span>
              </div>`);
          }
        }

        tree.innerHTML = parts.join("");
        tree.querySelectorAll(".topic-row[data-tag]").forEach(row => {
          row.addEventListener("click", () => selectTopic(row));
        });
        tree.querySelectorAll(".topic-row[data-cluster]").forEach(row => {
          row.addEventListener("click", (e) => {
            // Don't apply the cluster filter when the user clicks the ✎ icon.
            if (e.target.closest('[data-role="rename"]')) {
              e.stopPropagation();
              renameFaceCluster(row);
              return;
            }
            selectFaceCluster(row);
          });
          row.addEventListener("dblclick", () => renameFaceCluster(row));
        });
        topicTreeLoaded = true;
      } catch (e) {
        tree.innerHTML = `<div style="padding:10px;color:#a66;font-size:12px">로드 실패: ${escapeAttr(e.message || e)}</div>`;
      }
    }

    function selectTopic(row) {
      document.querySelectorAll("#topic-tree .topic-row.selected")
        .forEach(el => el.classList.remove("selected"));
      row.classList.add("selected");
      filterTag = row.dataset.tag;
      filterFaceCluster = null;
      filterRootId = null;
      filterPathPrefix = null;
      applyFilters();
    }

    function selectFaceCluster(row) {
      document.querySelectorAll("#topic-tree .topic-row.selected")
        .forEach(el => el.classList.remove("selected"));
      row.classList.add("selected");
      filterFaceCluster = parseInt(row.dataset.cluster, 10);
      filterTag = null;
      filterRootId = null;
      filterPathPrefix = null;
      applyFilters();
    }

    async function renameFaceCluster(row) {
      const id = parseInt(row.dataset.cluster, 10);
      const current = row.querySelector(".topic-name").textContent;
      const fresh = current.startsWith("미명명") ? "" : current;
      const next = prompt("이 인물의 이름을 입력 (예: 엄마, 아빠). 빈 값으로 이름 해제.", fresh);
      if (next === null) return;
      const res = await _origFetch(`/api/admin/ml/clusters/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ label: next.trim() || null }),
      });
      if (!res.ok) {
        alert("이름 변경 실패 (" + res.status + ")");
        return;
      }
      topicTreeLoaded = false;
      initTopicTree();
    }

    // --- Auth ---
    async function checkAuthOrRedirect() {
      const res = await fetch("/api/auth/me");
      if (res.status === 401) {
        const next = encodeURIComponent(location.pathname + location.search);
        location.replace(`/login.html?next=${next}`);
        return null;
      }
      if (!res.ok) throw new Error(`auth check failed: ${res.status}`);
      return res.json();
    }

    let currentUser = null;

    function showUserMenu(user) {
      currentUser = user;
      $("#user-menu").style.display = "";
      $("#user-name").textContent = user.username;
      $("#link-admin").style.display = user.is_admin ? "" : "none";
      // Only admins can delete photos (server enforces this too).
      $("#menu-delete").style.display = user.is_admin ? "" : "none";
      $("#menu-sep-delete").style.display = user.is_admin ? "" : "none";
      $("#bulk-delete").style.display = user.is_admin ? "" : "none";
      if (user.must_change_password) $("#nag-default-pw").classList.add("show");
    }

    // --- Theme (dark / light) ---
    const THEME_KEY = "myphotos-theme";
    function getTheme() {
      return localStorage.getItem(THEME_KEY) || "dark";
    }
    function applyTheme(theme) {
      document.body.classList.toggle("light", theme === "light");
      const btn = $("#btn-theme");
      if (btn) btn.textContent = theme === "light" ? "☀️" : "🌙";
      localStorage.setItem(THEME_KEY, theme);
    }
    applyTheme(getTheme());
    $("#btn-theme").addEventListener("click", () => {
      applyTheme(getTheme() === "light" ? "dark" : "light");
    });

    $("#btn-logout").addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      location.replace("/login.html");
    });

    // Any 401 from a subsequent API call (e.g. session expired) bounces to login.
    const _origFetch = window.fetch;
    window.fetch = async function(...args) {
      const res = await _origFetch.apply(this, args);
      if (res.status === 401 && args[0] !== "/api/auth/me") {
        location.replace("/login.html");
      }
      return res;
    };

    // --- Share modal ---
    const shareModal = $("#share-modal");
    const shareForm = $("#share-form");
    const shareMsg = $("#share-msg");
    const shareResult = $("#share-result-modal");
    const shareUrlInput = $("#share-url");

    function openShareModal() {
      if (!lightboxPhoto) return;
      shareForm.reset();
      shareMsg.textContent = "";
      shareModal.classList.add("show");
      setTimeout(() => $("#share-title").focus(), 0);
    }
    function closeShareModal() { shareModal.classList.remove("show"); }
    // The share entry-point now lives in the lightbox menu (#menu-share), which
    // is bound earlier in the menu-handler block. No standalone lb-share button.
    $("#share-cancel").addEventListener("click", closeShareModal);
    shareModal.addEventListener("click", (e) => { if (e.target === shareModal) closeShareModal(); });

    shareForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      shareMsg.textContent = "";
      const photo = lightboxPhoto;
      if (!photo) { shareMsg.textContent = "사진이 선택되지 않았습니다"; return; }
      const days = $("#share-expiry").value;
      const body = {
        photo_id: photo.id,
        title: $("#share-title").value.trim() || null,
        password: $("#share-pw").value || null,
        expires_in_days: days ? parseInt(days, 10) : null,
      };
      const res = await _origFetch("/api/shares", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        let msg = "생성 실패";
        try { const d = await res.json(); if (d?.detail) msg = d.detail; } catch (_) {}
        shareMsg.textContent = msg;
        return;
      }
      const data = await res.json();
      closeShareModal();
      const fullUrl = location.origin + data.url_path;
      shareUrlInput.value = fullUrl;
      const info = [];
      if (data.has_password) info.push("암호 보호");
      if (data.expires_at) info.push(`만료: ${data.expires_at.replace("T", " ").slice(0, 16)}`);
      $("#share-result-info").textContent = info.join(" · ") || "만료 없음 · 암호 없음";
      shareResult.classList.add("show");
      setTimeout(() => { shareUrlInput.focus(); shareUrlInput.select(); }, 0);
    });

    $("#share-copy").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(shareUrlInput.value);
        $("#share-copy").textContent = "복사됨 ✓";
        setTimeout(() => { $("#share-copy").textContent = "URL 복사"; }, 1500);
      } catch (_) {
        shareUrlInput.select();
        document.execCommand("copy");
      }
    });
    $("#share-close").addEventListener("click", () => shareResult.classList.remove("show"));
    shareResult.addEventListener("click", (e) => {
      if (e.target === shareResult) shareResult.classList.remove("show");
    });

    // --- Change password modal ---
    const pwModal = $("#pw-modal");
    const pwForm = $("#pw-form");
    const pwMsg = $("#pw-msg");
    function openPwModal() {
      pwForm.reset();
      pwMsg.textContent = "";
      pwModal.classList.add("show");
      setTimeout(() => $("#pw-old").focus(), 0);
    }
    function closePwModal() { pwModal.classList.remove("show"); }
    $("#btn-change-pw").addEventListener("click", openPwModal);
    $("#nag-change").addEventListener("click", openPwModal);
    $("#pw-cancel").addEventListener("click", closePwModal);
    pwModal.addEventListener("click", (e) => { if (e.target === pwModal) closePwModal(); });
    pwForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      pwMsg.textContent = "";
      const oldPw = $("#pw-old").value;
      const newPw = $("#pw-new").value;
      const newPw2 = $("#pw-new2").value;
      if (newPw !== newPw2) { pwMsg.textContent = "새 비밀번호가 일치하지 않습니다"; return; }
      if (newPw.length < 4)  { pwMsg.textContent = "4자 이상 입력하세요"; return; }
      const res = await _origFetch("/api/auth/change-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
      });
      if (res.ok) {
        closePwModal();
        $("#nag-default-pw").classList.remove("show");
        alert("비밀번호가 변경되었습니다");
      } else {
        let msg = "변경 실패";
        try { const d = await res.json(); if (d?.detail) msg = d.detail; } catch (_) {}
        pwMsg.textContent = msg;
      }
    });

    // --- Multi-select on the timeline grid ---
    const selectedIdx = new Set();   // indices into photos[]
    let lastSelectIdx = null;
    const bulkBar = $("#bulk-bar");
    const bulkCount = $("#bulk-count");
    const bulkProgress = $("#bulk-progress");

    function toggleSelect(idx, ev) {
      if (idx < 0 || idx >= photos.length) return;
      if (ev && ev.shiftKey && lastSelectIdx !== null) {
        const [a, b] = [lastSelectIdx, idx].sort((x, y) => x - y);
        // Shift-click toggles the range to the state of the click target —
        // if the target was previously deselected, select the whole range; vice versa.
        const becomeSelected = !selectedIdx.has(idx);
        for (let i = a; i <= b; i++) {
          if (becomeSelected) selectedIdx.add(i);
          else selectedIdx.delete(i);
        }
      } else {
        if (selectedIdx.has(idx)) selectedIdx.delete(idx);
        else selectedIdx.add(idx);
      }
      lastSelectIdx = idx;
      refreshSelectionUI();
    }

    function refreshSelectionUI() {
      document.body.classList.toggle("selecting", selectedIdx.size > 0);
      grid.querySelectorAll(".tile").forEach(el => {
        const i = parseInt(el.dataset.idx, 10);
        el.classList.toggle("selected", selectedIdx.has(i));
      });
      if (selectedIdx.size > 0) {
        bulkBar.classList.add("show");
        bulkCount.textContent = `${selectedIdx.size}개 선택됨`;
      } else {
        bulkBar.classList.remove("show");
        bulkProgress.textContent = "";
      }
    }

    function clearSelection() {
      selectedIdx.clear();
      lastSelectIdx = null;
      refreshSelectionUI();
    }
    $("#bulk-clear").addEventListener("click", clearSelection);

    $("#bulk-download").addEventListener("click", async () => {
      if (!selectedIdx.size) return;
      const ids = [...selectedIdx].map(i => photos[i]?.id).filter(Boolean);
      const btn = $("#bulk-download");
      btn.disabled = true;
      const oldText = btn.textContent;
      btn.textContent = "압축 중...";
      bulkProgress.textContent = `${ids.length}장`;
      try {
        const res = await _origFetch("/api/photos/bulk-download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ photo_ids: ids }),
        });
        if (!res.ok) {
          let m = `압축 실패 (${res.status})`;
          try { const d = await res.json(); if (d?.detail) m = d.detail; } catch (_) {}
          alert(m);
          return;
        }
        const data = await res.json();
        // Trigger the download via a hidden link — the GET hits
        // /bulk-download/{token} and streams the prepared zip.
        const a = document.createElement("a");
        a.href = data.url;
        a.download = data.filename || "myphotos.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        if (data.skipped && data.skipped.length) {
          bulkProgress.textContent = `${data.added}장 다운로드 · ${data.skipped.length}장 건너뜀`;
        } else {
          bulkProgress.textContent = `${data.added}장 다운로드`;
        }
      } catch (e) {
        alert("네트워크 오류: " + (e.message || e));
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });

    $("#bulk-delete").addEventListener("click", async () => {
      if (!selectedIdx.size) return;
      const ids = [...selectedIdx].map(i => photos[i]?.id).filter(Boolean);
      if (!confirm(
        `${ids.length}개 사진을 삭제하시겠습니까?\n원본 파일은 휴지통(data/trash/)으로 이동됩니다.`
      )) return;
      const btn = $("#bulk-delete");
      btn.disabled = true;
      try {
        const res = await _origFetch("/api/photos/bulk-delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ photo_ids: ids }),
        });
        if (!res.ok) {
          let m = `삭제 실패 (${res.status})`;
          try { const d = await res.json(); if (d?.detail) m = d.detail; } catch (_) {}
          alert(m);
          return;
        }
        const data = await res.json();
        clearSelection();
        // Easiest correct path: reload from page 1 with current filters.
        await applyFilters();
        bulkProgress.textContent = "";
        if (data.failed && data.failed.length) {
          alert(`${data.deleted}장 삭제됨 · ${data.failed.length}장 실패`);
        }
      } finally {
        btn.disabled = false;
      }
    });

    // --- Search (comment / place / rating / tag) ---
    async function applyFilters() {
      // Clearing selection on filter/reset — photos[] is about to be rebuilt
      // and stored indices would become stale references.
      clearSelection();
      photos.length = 0;
      grid.innerHTML = "";
      lastDateHeader = null;
      loadedCount = 0;
      done = false;
      loading = false;
      windowStart = 0;
      nextPage = 1;
      totalCount = 0;
      window.scrollTo({ top: 0, behavior: "instant" });
      $("#search-clear").style.display = anyFilterActive() ? "" : "none";
      await loadHistogram();
      await loadNextPage();
      renderYearMarks();
      updateScrollIndicator();
      // Map view shares the same filter state — keep its markers in sync.
      if (currentView === "map") {
        await reloadMapMarkers();
      }
    }

    async function runSearch() {
      const mode = $("#search-mode").value;
      const text = $("#search-q").value.trim();
      const ratingVal = $("#search-rating").value;
      filterMinRating = ratingVal ? parseInt(ratingVal, 10) : null;

      if (mode === "place" && text) {
        try {
          const r = await _origFetch(
            "/api/photos/geocode?q=" + encodeURIComponent(text) + "&limit=1"
          );
          if (!r.ok) throw new Error("HTTP " + r.status);
          const hits = await r.json();
          if (!hits.length) {
            alert(`'${text}' 위치를 찾을 수 없습니다`);
            return;
          }
          const h = hits[0];
          filterNear = { lat: h.lat, lng: h.lng, label: h.display_name, radius: 0.05 };
          filterCommentQ = "";
          filterTagQ = "";
          const short = h.display_name.length > 50
            ? h.display_name.slice(0, 50) + "…"
            : h.display_name;
          $("#search-q").value = short;
          $("#search-q").title = h.display_name;
        } catch (e) {
          alert("지오코드 실패: " + (e.message || e));
          return;
        }
      } else if (mode === "comment") {
        filterCommentQ = text;
        filterTagQ = "";
        filterNear = null;
        $("#search-q").title = "";
      } else if (mode === "tag") {
        filterTagQ = text;
        filterCommentQ = "";
        filterNear = null;
        $("#search-q").title = "";
      } else {
        filterNear = null;
      }
      await applyFilters();
    }

    $("#search-q").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); runSearch(); }
    });
    $("#search-rating").addEventListener("change", () => {
      const r = $("#search-rating").value;
      filterMinRating = r ? parseInt(r, 10) : null;
      applyFilters();
    });
    $("#search-mode").addEventListener("change", () => {
      // Switching modes clears the comment / place / tag state; rating stays.
      filterCommentQ = "";
      filterTagQ = "";
      filterNear = null;
      $("#search-q").value = "";
      $("#search-q").title = "";
      if (anyFilterActive()) applyFilters();
    });
    $("#search-clear").addEventListener("click", () => {
      filterCommentQ = "";
      filterTagQ = "";
      filterMinRating = null;
      filterNear = null;
      filterTag = null;
      filterFaceCluster = null;
      $("#search-q").value = "";
      $("#search-q").title = "";
      $("#search-rating").value = "";
      applyFilters();
    });

    // Server-provided config (branding + map tunables). Defaults are baked
    // in here so the page works even if the fetch fails.
    let appConfig = { map_nearby_radius_deg: 0.005, map_nearby_limit: 100 };
    fetch("/api/config").then(r => r.ok ? r.json() : null).then(cfg => {
      if (!cfg) return;
      appConfig = Object.assign(appConfig, cfg);
      if (cfg.app_name) {
        $("#app-title").textContent = cfg.app_name;
        document.title = cfg.app_name;
      }
    }).catch(() => {});

    // Kick things off — auth first, then histogram so totalCount + year marks
    // are ready by the time the first page renders.
    (async () => {
      const user = await checkAuthOrRedirect();
      if (!user) return;
      showUserMenu(user);
      await loadHistogram();
      await loadNextPage();
      renderYearMarks();
      updateScrollIndicator();
      // Restore the last selected tab from previous visit (timeline is
      // already active by default, so it's a no-op when saved == null/timeline).
      try {
        const saved = localStorage.getItem(VIEW_KEY);
        if (saved === "map" || saved === "folder" || saved === "topic") {
          setView(saved);
        }
      } catch (_) { /* private mode — stay on default */ }
    })();
  </script>
</body>
</html>
