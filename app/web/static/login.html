<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyPhotos — 로그인</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📷</text></svg>'>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111; color: #eee;
    }
    .card {
      width: 320px; padding: 32px 28px;
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 600; }
    .sub { margin: 0 0 24px; font-size: 13px; color: #888; }
    label { display: block; font-size: 12px; color: #aaa; margin: 12px 0 4px; }
    input {
      width: 100%; padding: 9px 11px;
      background: #222; color: #eee; border: 1px solid #333;
      border-radius: 5px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #3a6db0; }
    button {
      width: 100%; margin-top: 20px; padding: 10px;
      background: #2a4d7a; color: white; border: 1px solid #3a6db0;
      border-radius: 5px; font-size: 14px; cursor: pointer; font-weight: 600;
    }
    button:hover:not(:disabled) { background: #355d8e; }
    button:disabled { opacity: 0.5; cursor: default; }
    .err {
      margin-top: 14px; padding: 8px 10px;
      background: rgba(180,60,60,0.15); border: 1px solid rgba(220,80,80,0.35);
      color: #ffb0b0; font-size: 13px; border-radius: 4px;
      display: none;
    }
    .err.show { display: block; }
    .hint {
      margin-top: 16px; font-size: 11px; color: #666; text-align: center;
    }
    /* shared light theme — toggled from the main app */
    body.light { background: #f5f6f7; color: #1a1a1a; color-scheme: light; }
    body.light .card { background: #fff; border-color: #e0e2e6; box-shadow: 0 6px 24px rgba(0,0,0,0.08); }
    body.light .sub { color: #555; }
    body.light label { color: #555; }
    body.light input { background: #fff; color: #1a1a1a; border-color: #d0d3d8; }
    body.light input:focus { border-color: #1976d2; }
    body.light button { background: #1976d2; border-color: #1565c0; }
    body.light button:hover:not(:disabled) { background: #1565c0; }
    body.light .hint { color: #888; }
  </style>
</head>
<body>
  <script>
    // Apply persisted theme immediately so we don't flash dark before paint.
    try {
      if (localStorage.getItem("myphotos-theme") === "light") {
        document.body.classList.add("light");
      }
    } catch (_) { /* localStorage may be disabled */ }
  </script>
  <form class="card" id="login-form">
    <h1 id="app-title">MyPhotos</h1>
    <p class="sub" data-i18n="login.subtitle">로그인이 필요합니다.</p>

    <label for="username" data-i18n="login.username">사용자명</label>
    <input type="text" id="username" name="username" autocomplete="username"
           autofocus required>

    <label for="password" data-i18n="login.password">비밀번호</label>
    <input type="password" id="password" name="password"
           autocomplete="current-password" required>

    <div class="err" id="err"></div>
    <button type="submit" id="submit" data-i18n="login.submit">로그인</button>
    <!-- Language picker — visible before login so the first impression
         honours whatever language the user prefers. Selection is sticky
         in localStorage; admin/share/login pages will use it. -->
    <div style="margin-top:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#888">
      <span style="flex:0 0 auto" data-i18n="header.language">Language</span>
      <select id="lang-picker" style="flex:1;background:#222;color:#ddd;border:1px solid #333;border-radius:4px;padding:5px 8px;font-size:12px;cursor:pointer"></select>
    </div>
  </form>

  <script src="/js/i18n.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const err = document.getElementById("err");
    const submit = document.getElementById("submit");

    // Branding + i18n bootstrap: /api/config is public so we can
    // pull both the app_name override and the default_language without
    // needing the user to be authenticated first.
    fetch("/api/config").then(r => r.ok ? r.json() : null).then(async (cfg) => {
      if (cfg && cfg.app_name) {
        document.getElementById("app-title").textContent = cfg.app_name;
        document.title = `${cfg.app_name} — 로그인`;
      }
      if (window.i18n) {
        await i18n.init(cfg && cfg.default_language || null);
        const picker = document.getElementById("lang-picker");
        if (picker) {
          picker.innerHTML = i18n.getSupportedLangs().map(s =>
            `<option value="${s.code}">${s.name}</option>`
          ).join("");
          picker.value = i18n.getCurrentLang();
          picker.addEventListener("change", async () => {
            await i18n.setUserLang(picker.value);
          });
          i18n.onChange((lang) => { picker.value = lang; });
        }
      }
    }).catch(() => { /* fall back to the hard-coded default */ });

    function _t(key, fallback) {
      // Tiny wrapper: t(key) returns the key when no catalog is loaded,
      // so we explicitly fall back to the original Korean copy in that
      // case to avoid showing "login.checking" as a literal label.
      if (window.i18n && i18n.t) {
        const v = i18n.t(key);
        if (v && v !== key) return v;
      }
      return fallback;
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.remove("show");
      submit.disabled = true;
      submit.textContent = _t("login.checking", "확인 중...");
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value,
          }),
        });
        if (res.ok) {
          // Preserve a ?next=... param if present for deep links.
          const next = new URLSearchParams(location.search).get("next") || "/";
          location.replace(next);
          return;
        }
        let msg = _t("login.failed", "로그인 실패");
        try {
          const data = await res.json();
          if (data?.detail) msg = data.detail;
        } catch (_) { /* ignore */ }
        err.textContent = msg;
        err.classList.add("show");
      } catch (e) {
        err.textContent = _t("common.network_error", "네트워크 오류") + ": " + e.message;
        err.classList.add("show");
      } finally {
        submit.disabled = false;
        submit.textContent = _t("login.submit", "로그인");
      }
    });
  </script>
</body>
</html>
