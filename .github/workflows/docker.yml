name: docker

# Build the MyPhotos image and push it to GitHub Container Registry (GHCR).
#
# Triggers:
#   - push to main         → tags: latest, sha-<short>
#   - push of a v* tag     → tags: <tag> (e.g. v1.2.0), latest
#   - manual dispatch      → tags: latest, sha-<short>
#
# Image name: ghcr.io/<owner>/myphotos
#   (owner is the repo owner — lowercased automatically by metadata-action)
#
# First-time setup:
#   1. After the first successful run, open the package on GitHub
#      (Packages tab → myphotos) → Package settings → change visibility to
#      Public. That lets the NAS pull without authentication.
#   2. Repo settings → Actions → General → Workflow permissions →
#      "Read and write permissions" must be enabled (default for public repos).

on:
  # Manual-only by default. Owner runs Actions → docker → "Run
  # workflow" when they want to publish a new image. Avoids piling
  # up dozens of GHCR versions from every main push.
  workflow_dispatch:
  # Version tags still auto-publish — pushing v1.2.3 is itself an
  # explicit "release this" gesture, no extra click needed.
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/myphotos
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache keeps wheel installs warm between runs (onnxruntime,
          # numpy, pillow-heif are ~hundreds of MB and slow to download).
          cache-from: type=gha
          cache-to: type=gha,mode=max
