name: setup-scripts-lint

# Lint the cross-platform installer scripts on every push that touches
# them, plus on PRs. The Docker image build workflow is gated on tags
# so it never catches a broken setup.sh; this catches regressions
# before they ship.

on:
  push:
    paths:
      - "scripts/setup.sh"
      - "scripts/setup.ps1"
      - ".github/workflows/setup-scripts-lint.yml"
  pull_request:
    paths:
      - "scripts/setup.sh"
      - "scripts/setup.ps1"
      - ".github/workflows/setup-scripts-lint.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck setup.sh
        # Only lint the wizard. The other scripts under scripts/
        # predate this lint workflow and carry stylistic warnings
        # we don't want to chase down right now; this guard is
        # specifically for setup.sh + setup.ps1 (the user-facing
        # installers).
        # severity=error so style nits don't gate releases — only
        # real portability/correctness bugs do.
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: error
          scandir: "./scripts"
          additional_files: "setup.sh"
          ignore_paths: >-
            backup-db.sh
            bootstrap.sh
            download-frontend-libs.sh
            fix-photo-perms.sh
            install-ml-models.sh
            install-systemd.sh
            install-vendor-linux-x64.sh
            upload-ml-models.sh

  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          # Error severity only. PSAvoidUsingWriteHost (a Warning)
          # would fail an interactive installer that's *supposed*
          # to talk to the user via Write-Host — that's by design.
          # Same for PSUseShouldProcessForStateChangingFunctions
          # (the wizard doesn't take -WhatIf, the user already
          # confirmed by running it). Excluded explicitly so a
          # future tightening of the default rule set doesn't
          # spuriously fail the lint.
          $issues = Invoke-ScriptAnalyzer -Path scripts/setup.ps1 `
                      -Severity Error `
                      -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions
          if ($issues) {
            $issues | Format-List | Out-String | Write-Output
            exit 1
          }
          Write-Output "setup.ps1 clean."
